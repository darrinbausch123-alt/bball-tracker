<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-Ball Tracker Pro</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            text-align: center; 
            margin: 0; 
            background: #121212; 
            color: white; 
            overflow: hidden; /* Prevents accidental scrolling */
            touch-action: manipulation; /* Disables browser double-tap-to-zoom */
        }
        
        #stats-bar {
            background: #1f1f1f;
            padding: 20px 10px;
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid #333;
        }
        .stat-value { display: block; font-size: 28px; font-weight: 800; color: #2ecc71; }
        .stat-label { font-size: 11px; text-transform: uppercase; color: #888; }

        #court-container {
            position: relative;
            display: inline-block;
            margin-top: 15px;
            touch-action: none; 
        }

        #court-img {
            width: 95vw;
            max-width: 500px;
            display: block;
            border-radius: 12px;
        }

        .dot {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            pointer-events: none;
        }
        .make { background-color: #2ecc71; }
        .miss { background-color: #e74c3c; }

        .instructions { color: #888; font-size: 14px; margin: 10px; }
        .controls { margin: 20px; display: flex; gap: 10px; justify-content: center; }
        
        button { 
            padding: 15px; font-weight: bold; border-radius: 8px; border: none; color: white; flex: 1; max-width: 120px;
        }
        .btn-undo { background: #444; }
        .btn-reset { background: #c0392b; }
    </style>
</head>
<body>

    <div id="stats-bar">
        <div class="stat-item">
            <span id="stat-total" class="stat-value">0</span>
            <span class="stat-label">Total</span>
        </div>
        <div class="stat-item">
            <span id="stat-pct" class="stat-value">0%</span>
            <span class="stat-label">FG%</span>
        </div>
    </div>

    <p class="instructions">Single Tap = 🟢 MAKE | Double Tap = 🔴 MISS</p>

    <div id="court-container">
        <img id="court-img" src="court.png" alt="Court">
    </div>

    <div class="controls">
        <button class="btn-undo" onclick="undoLast()">Undo</button>
        <button class="btn-reset" onclick="clearShots()">Reset</button>
    </div>

    <script>
        const container = document.getElementById('court-container');
        let shots = [];
        let tapTimer = null;

        window.onload = function() {
            const savedData = localStorage.getItem('basketballShots');
            if (savedData) {
                shots = JSON.parse(savedData);
                refreshUI();
            }
        };

        // Custom Double-Tap Logic
        container.addEventListener('click', function(e) {
            const rect = container.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            if (tapTimer === null) {
                // First tap detected! Start a timer to wait for a second tap
                tapTimer = setTimeout(() => {
                    // Timer finished without a second tap -> It's a MAKE
                    recordShot(x, y, 'make');
                    tapTimer = null;
                }, 250); // 250ms window
            } else {
                // Second tap detected within 250ms -> It's a MISS
                clearTimeout(tapTimer);
                tapTimer = null;
                recordShot(x, y, 'miss');
            }
        });

        function recordShot(x, y, result) {
            shots.push({ x, y, result });
            saveAndRefresh();
        }

        function refreshUI() {
            const existingDots = document.querySelectorAll('.dot');
            existingDots.forEach(d => d.remove());

            shots.forEach(shot => {
                const dot = document.createElement('div');
                dot.className = `dot ${shot.result}`;
                dot.style.left = shot.x + '%';
                dot.style.top = shot.y + '%';
                container.appendChild(dot);
            });

            const total = shots.length;
            const makes = shots.filter(s => s.result === 'make').length;
            const percentage = total === 0 ? 0 : Math.round((makes / total) * 100);

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-pct').innerText = percentage + "%";
        }

        function saveAndRefresh() {
            localStorage.setItem('basketballShots', JSON.stringify(shots));
            refreshUI();
        }

        function undoLast() {
            shots.pop();
            saveAndRefresh();
        }

        function clearShots() {
            if(confirm("Reset all data?")) {
                shots = [];
                localStorage.removeItem('basketballShots');
                refreshUI();
            }
        }
    </script>
</body>
</html>
