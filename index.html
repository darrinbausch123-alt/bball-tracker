<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-Ball Tracker Pro</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            text-align: center; 
            margin: 0; 
            background: #121212; 
            color: white; 
            overflow-x: hidden;
            touch-action: manipulation;
        }
        
        #stats-bar {
            background: #1f1f1f;
            padding: 15px 10px;
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid #333;
        }
        .stat-value { display: block; font-size: 26px; font-weight: 800; color: #2ecc71; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #888; }

        /* Game Name Input Styling */
        #game-name-input {
            width: 85%;
            max-width: 400px;
            margin: 20px auto 10px auto;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #f1c40f; /* Gold text */
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            outline: none;
        }
        #game-name-input::placeholder { color: #666; font-weight: normal; }

        #court-container {
            position: relative;
            display: inline-block;
            touch-action: none; 
        }

        #court-img {
            width: 95vw;
            max-width: 500px;
            display: block;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .dot {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            pointer-events: none;
        }
        .make { background-color: #2ecc71; }
        .miss { background-color: #e74c3c; }

        .instructions { color: #888; font-size: 13px; margin: 10px; }
        
        .controls { 
            margin: 20px; 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
        }
        
        button { 
            padding: 15px; font-weight: bold; border-radius: 10px; border: none; color: white; cursor: pointer; flex: 1; max-width: 140px;
        }
        .btn-undo { background: #444; }
        .btn-reset { background: #c0392b; }
        button:active { opacity: 0.7; }
    </style>
</head>
<body>

    <div id="stats-bar">
        <div class="stat-item">
            <span id="stat-total" class="stat-value">0</span>
            <span class="stat-label">Total Shots</span>
        </div>
        <div class="stat-item">
            <span id="stat-pct" class="stat-value">0%</span>
            <span class="stat-label">Field Goal %</span>
        </div>
    </div>

    <input type="text" id="game-name-input" placeholder="Enter Game Name (e.g. vs Iowa Falls)" oninput="saveGameName()">

    <div id="court-container">
        <img id="court-img" src="court.png" alt="Court">
    </div>

    <p class="instructions">Single Tap = 🟢 MAKE | Double Tap = 🔴 MISS</p>

    <div class="controls">
        <button class="btn-undo" onclick="undoLast()">Undo Last</button>
        <button class="btn-reset" onclick="clearShots()">Reset All</button>
    </div>

    <script>
        const container = document.getElementById('court-container');
        const nameInput = document.getElementById('game-name-input');
        let shots = [];
        let tapTimer = null;

        // 1. Load data on startup
        window.onload = function() {
            const savedData = localStorage.getItem('basketballShots');
            const savedName = localStorage.getItem('basketballGameName');
            
            if (savedData) {
                shots = JSON.parse(savedData);
                refreshUI();
            }
            if (savedName) {
                nameInput.value = savedName;
            }
        };

        // 2. Save Game Name as you type
        function saveGameName() {
            localStorage.setItem('basketballGameName', nameInput.value);
        }

        // 3. Handle Court Taps (Single/Double Logic)
        container.addEventListener('click', function(e) {
            const rect = container.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            if (tapTimer === null) {
                tapTimer = setTimeout(() => {
                    recordShot(x, y, 'make');
                    tapTimer = null;
                }, 250);
            } else {
                clearTimeout(tapTimer);
                tapTimer = null;
                recordShot(x, y, 'miss');
            }
        });

        function recordShot(x, y, result) {
            shots.push({ x, y, result });
            saveAndRefresh();
        }

        function refreshUI() {
            const existingDots = document.querySelectorAll('.dot');
            existingDots.forEach(d => d.remove());

            shots.forEach(shot => {
                const dot = document.createElement('div');
                dot.className = `dot ${shot.result}`;
                dot.style.left = shot.x + '%';
                dot.style.top = shot.y + '%';
                container.appendChild(dot);
            });

            const total = shots.length;
            const makes = shots.filter(s => s.result === 'make').length;
            const percentage = total === 0 ? 0 : Math.round((makes / total) * 100);

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-pct').innerText = percentage + "%";
        }

        function saveAndRefresh() {
            localStorage.setItem('basketballShots', JSON.stringify(shots));
            refreshUI();
        }

        function undoLast() {
            if(shots.length > 0) {
                shots.pop();
                saveAndRefresh();
            }
        }

        function clearShots() {
            if(confirm("This will clear the court AND the game name. Continue?")) {
                shots = [];
                nameInput.value = "";
                localStorage.removeItem('basketballShots');
                localStorage.removeItem('basketballGameName');
                refreshUI();
            }
        }
    </script>
</body>
</html>
